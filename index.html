<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR Kessar — Digital Projects Developer</title>
<meta name="description" content="MR Kessar — Professional digital projects developer. Web pages, stores, apps, video ads, automation.">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:hsl(0,0%,100%);--fg:hsl(222,47%,11%);--card:hsl(210,50%,98%);--card-fg:hsl(222,47%,11%);
--primary:hsl(199,89%,48%);--primary-fg:hsl(0,0%,100%);--secondary:hsl(214,95%,93%);
--muted:hsl(210,40%,96%);--muted-fg:hsl(215,16%,47%);--accent:hsl(214,95%,93%);
--border:hsl(214,32%,91%);--glow:199,89%,48%;--radius:0.75rem;
}
.dark{
--bg:hsl(222,71%,4%);--fg:hsl(210,40%,98%);--card:hsl(222,50%,8%);--card-fg:hsl(210,40%,98%);
--primary:hsl(217,91%,40%);--primary-fg:hsl(210,40%,98%);--secondary:hsl(217,33%,17%);
--muted:hsl(217,33%,17%);--muted-fg:hsl(215,20%,65%);--accent:hsl(199,92%,61%);
--border:hsl(217,33%,17%);--glow:199,92%,61%;
}
body{font-family:'Inter','IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}
.glass-card{background:color-mix(in srgb,var(--card) 70%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid color-mix(in srgb,var(--border) 50%,transparent);border-radius:1rem;box-shadow:0 8px 32px hsla(var(--glow),.08);transition:box-shadow .3s,transform .3s}
.glass-card:hover{box-shadow:0 12px 40px hsla(var(--glow),.18)}
.btn-primary{display:inline-block;background:var(--primary);color:var(--primary-fg);padding:12px 32px;border-radius:var(--radius);font-weight:600;font-size:.95rem;border:none;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px hsla(var(--glow),.3); text-decoration: none;}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 8px 30px hsla(var(--glow),.5)}
.btn-outline{display:inline-block;padding:12px 32px;border-radius:var(--radius);font-weight:600;border:1px solid var(--primary);color:var(--primary);background:transparent;cursor:pointer;transition:all .3s; text-decoration: none;}
.btn-outline:hover{background:hsla(var(--glow),.1)}
.topbar{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:8px;direction:ltr}
.lang-bar{display:flex;gap:2px;padding:4px;align-items:center}
.lang-btn{padding:4px 8px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--muted-fg);transition:all .2s}
.lang-btn.active{background:var(--primary);color:var(--primary-fg)}
.theme-btn{padding:8px;border-radius:var(--radius);border:none;cursor:pointer;background:transparent;color:var(--primary);font-size:18px;transition:transform .2s}
.theme-btn:hover{transform:scale(1.1)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 30px hsla(var(--glow),.3)}50%{box-shadow:0 0 60px hsla(var(--glow),.6)}}
@keyframes fade-in-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim-float{animation:float 4s ease-in-out infinite}
.anim-glow{animation:glow-pulse 3s ease-in-out infinite}
.anim-fade{animation:fade-in-up .6s ease-out forwards}
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:80px 16px 32px}
.hero-logo{width:140px;height:140px;border-radius:50%;object-fit:contain}
.hero h1{font-size:2.5rem;font-weight:800;margin:16px 0 8px}
.hero .subtitle{font-size:1.1rem;color:var(--primary);font-weight:600;max-width:560px;white-space:pre-line;margin-bottom:12px}
.hero .desc{font-size:.9rem;color:var(--muted-fg);max-width:640px;white-space:pre-line;margin-bottom:24px;line-height:1.7}
.services{max-width:960px;margin:0 auto;padding:0 16px 48px}
.services h2{text-align:center;font-size:1.5rem;font-weight:700;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.service-card{padding:32px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer}
.service-card:hover{transform:scale(1.04)}
.service-card .emoji{font-size:2.5rem;margin-bottom:12px}
.service-card .label{font-weight:600;font-size:1.05rem}
.page{min-height:100vh;padding:80px 16px 40px;max-width:900px;margin:0 auto;display:none}
.page.active{display:block}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-weight:600;margin-bottom:32px;cursor:pointer;transition:opacity .2s}
.back-link:hover{opacity:.7}
.page h1{font-size:2.2rem;font-weight:800;margin-bottom:12px}
.page .page-desc{color:var(--muted-fg);font-size:1.05rem;margin-bottom:20px;white-space:pre-line;line-height:1.7}
.page .btns{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:40px}
.gallery h2{font-size:1.3rem;font-weight:700;margin-bottom:16px}
.swiper{border-radius:1rem;overflow:hidden}
.swiper-slide{background:color-mix(in srgb,var(--muted) 30%,transparent);display:flex;align-items:center;justify-content:center;min-height:300px}
.swiper-slide img{width:100%;height:100%;object-fit:contain;max-height:600px}
.swiper-slide video{width:100%;max-height:600px}
.swiper-button-next,.swiper-button-prev{color:var(--primary)!important}
.swiper-pagination-bullet-active{background:var(--primary)!important}
.comments{max-width:900px;margin:0 auto;padding:0 16px 80px}
.comments h2{font-size:1.3rem;font-weight:700;margin-bottom:20px}
.comment-form{padding:24px;margin-bottom:24px}
.comment-form input,.comment-form textarea{width:100%;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:color-mix(in srgb,var(--muted) 50%,transparent);color:var(--fg);margin-bottom:12px;font-family:inherit;font-size:.9rem;outline:none;resize:none}
.comment-form input:focus,.comment-form textarea:focus{box-shadow:0 0 0 2px var(--primary)}
.stars-input{display:flex;gap:4px;margin-bottom:12px}
.stars-input button{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted-fg);transition:color .15s}
.stars-input button.active{color:#facc15}
.comment-item{padding:20px;margin-bottom:12px}
.comment-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.comment-avatar{width:32px;height:32px;border-radius:50%;background:hsla(var(--glow),.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary)}
.comment-name{font-weight:600}
.comment-date{font-size:.75rem;color:var(--muted-fg);margin-inline-start:auto}
.comment-stars{display:flex;gap:2px;margin-bottom:6px;font-size:14px}
.comment-text{font-size:.9rem;color:color-mix(in srgb,var(--fg) 90%,transparent);line-height:1.6}
@media(min-width:768px){.hero-logo{width:176px;height:176px}.hero h1{font-size:3.5rem}.hero .subtitle{font-size:1.25rem}.hero .desc{font-size:1rem}.swiper-slide{min-height:500px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="glass-card lang-bar" id="langBar"></div>
  <button class="glass-card theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
</div>
<div id="home">
  <section class="hero">
    <div class="anim-fade" style="margin-bottom:24px">
      <img id="heroLogo" src="https://raw.githubusercontent.com/alaamnst-collab/-/main/Whisk_3b510798b685b0fb318464b4f38ca67adr.png" alt="MR Kessar Logo" class="hero-logo anim-glow">
    </div>
    <h1 class="anim-fade" id="heroTitle">MR Kessar</h1>
    <p class="subtitle anim-fade" id="heroSubtitle" style="animation-delay:.1s"></p>
    <p class="desc anim-fade" id="heroDesc" style="animation-delay:.2s"></p>
    <a href="https://www.instagram.com/mr.kessar?igsh=MTFybHViYm03cGx1MQ==" target="_blank" rel="noopener noreferrer" class="btn-primary anim-fade" style="animation-delay:.3s" id="heroContact"></a>
  </section>
  <section class="services">
    <h2 id="servicesTitle"></h2>
    <div class="grid" id="servicesGrid"></div>
  </section>
  <section class="comments" id="commentsSection"></section>
</div>
<div class="page" id="page-video"></div>
<div class="page" id="page-pages"></div>
<div class="page" id="page-store"></div>
<div class="page" id="page-app"></div>
<div class="page" id="page-automation"></div>

<script>
const T = {
  heroTitle:{ar:'MR Kessar',en:'MR Kessar',fr:'MR Kessar',es:'MR Kessar'},
  heroSubtitle:{ar:'مطور مشاريع رقمية محترف\nأحوّل فكرتك إلى مشروع ناجح على الإنترنت',en:'Professional Digital Projects Developer\nI turn your idea into a successful online project',fr:'Développeur de projets numériques professionnel\nJe transforme votre idée en projet réussi en ligne',es:'Desarrollador profesional de proyectos digitales\nConvierto tu idea en un proyecto exitoso en línea'},
  heroDesc:{ar:'محترف في تطوير المشاريع الرقمية وبناء الأنظمة الذكية عبر الإنترنت.\nأساعد رواد الأعمال وأصحاب الأفكار على تحويل مشاريعهم إلى منصات احترافية.\nأبني مشاريع رقمية تحقق الربح.\nمن الفكرة إلى التنفيذ الكامل.',en:'Expert in developing digital projects and building smart online systems.\nI help entrepreneurs turn their projects into professional platforms.\nI build profitable digital projects.\nFrom idea to full execution.',fr:"Expert en développement de projets numériques et systèmes intelligents en ligne.\nJ'aide les entrepreneurs à transformer leurs projets en plateformes professionnelles.\nJe construis des projets numériques rentables.\nDe l'idée à l'exécution complète.",es:'Experto en desarrollo de proyectos digitales y sistemas inteligentes en línea.\nAyudo a emprendedores a convertir sus proyectos en plataformas profesionales.\nConstruyo proyectos digitales rentables.\nDesde la idea hasta la ejecución completa.'},
  contactMe:{ar:'تواصل معي',en:'Contact Me',fr:'Contactez-moi',es:'Contáctame'},
  services:{ar:'خدماتي',en:'My Services',fr:'Mes Services',es:'Mis Servicios'},
  videoAds:{ar:'فيديوهات إعلانية',en:'Video Ads',fr:'Vidéos Publicitaires',es:'Videos Publicitarios'},
  webPages:{ar:'صفحات ويب',en:'Web Pages',fr:'Pages Web',es:'Pages Web'},
  stores:{ar:'متاجر إلكترونية',en:'Online Stores',fr:'Boutiques en Ligne',es:'Tiendas en Línea'},
  apps:{ar:'تطبيقات',en:'Applications',fr:'Applications',es:'Aplicaciones'},
  automation:{ar:'أتمتة',en:'Automation',fr:'Automatisation',es:'Automatización'},
  orderNow:{ar:'اطلب الآن',en:'Order Now',fr:'Commander',es:'Pedir Ahora'},
  gallery:{ar:'معرض الأعمال',en:'Gallery',fr:'Galerie',es:'Galería'},
  backHome:{ar:'الرئيسية',en:'Home',fr:'Accueil',es:'Inicio'},
  name:{ar:'الاسم',en:'Name',fr:'Nom',es:'Nombre'},
  videoDesc:{ar:'فيديوهات إعلانية احترافية تجذب العملاء وتزيد المبيعات',en:'Professional advertising videos that attract customers and increase sales',fr:'Vidéos publicitaires professionnelles qui attirent les clients',es:'Videos publicitarios profesionales que atraen clientes'},
  pagesDesc:{ar:'صفحات ويب احترافية وسريعة بتصميم عصري',en:'Professional, fast web pages with modern design',fr:'Pages web professionnelles et rapides avec un design moderne',es:'Páginas web profesionales y rápidas con diseño moderno'},
  storeDesc:{ar:'متاجر إلكترونية متكاملة مع أنظمة دفع وشحن',en:'Complete online stores with payment and shipping systems',fr:'Boutiques en ligne complètes avec paiement et expédition',es:'Tiendas en línea completas con sistemas de pago y envío'},
  appDesc:{ar:'تطبيقات موبايل احترافية لنظامي أندرويد وآيفون',en:'Professional mobile apps for Android and iOS',fr:'Applications mobiles professionnelles pour Android et iOS',es:'Aplicaciones mobiles profesionales para Android e iOS'},
  autoDesc:{ar:'أتمتة العمليات التجارية وأنظمة الذكاء الاصطناعي',en:'Business process automation and AI systems',fr:'Automatisation des processus et systèmes IA',es:'Automatización de procesos y sistemas de IA'},
  comments:{ar:'التعليقات',en:'Comments',fr:'Commentaires',es:'Commentaires'},
  writeComment:{ar:'اكتب تعليقاً...',en:'Write a comment...',fr:'Écrire un commentaire...',es:'Escribe un comentario...'},
  submit:{ar:'إرسال',en:'Submit',fr:'Envoyer',es:'Enviar'},
};

const pagesData={
  video:{titleKey:'videoAds',descKey:'videoDesc',price:'99$',images:[],videos:['https://raw.githubusercontent.com/alaamnst-collab/Vid/main/lv_0_20260313014600.mp4']},
  pages:{titleKey:'webPages',descKey:'pagesDesc',price:'199$',images:['https://raw.githubusercontent.com/alaamnst-collab/Mawki3-wib/main/2.%2020260310_165821_112.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Mawki3-wib/main/3.%2020260310_165821_162.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Mawki3-wib/main/5.%2020260310_165841_165.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Mawki3-wib/main/Whisk_e81de0045f9bd27b5984d2af59c50ebadr.jpeg'],videos:[]},
  store:{titleKey:'stores',descKey:'storeDesc',price:'399$',images:['https://raw.githubusercontent.com/alaamnst-collab/Matjar/main/Whisk_1f592b2520f8dd582a644b4370569e97dr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Matjar/main/Whisk_4a59c1a8d42d26b9da641b123d245222dr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Matjar/main/Whisk_4ba3897a866e895b0e944613fab1a513dr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Matjar/main/Whisk_5cb739f83c2fb3588b54133807867764dr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Matjar/main/Whisk_fdda8906b0d86a4b3ae4b49c8c008060dr.jpeg'],videos:[]},
  app:{titleKey:'apps',descKey:'appDesc',price:'499$',images:['https://raw.githubusercontent.com/alaamnst-collab/Tatbik/main/Picsart_26-03-10_16-40-27-629.jpg','https://raw.githubusercontent.com/alaamnst-collab/Tatbik/main/Picsart_26-03-10_16-42-11-294.jpg','https://raw.githubusercontent.com/alaamnst-collab/Tatbik/main/Whisk_275473eff151c7082254edc1f15f798ddr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Tatbik/main/Whisk_6719437bc729151ba0d4d0f15babb2d6dr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Tatbik/main/Whisk_75df3d67a694fd48e464fddd4b69d033dr.jpeg'],videos:[]},
  automation:{titleKey:'automation',descKey:'autoDesc',price:'199$',images:['https://raw.githubusercontent.com/alaamnst-collab/Aouta/main/Whisk_074eecaebaf18388feb45168982b6dc2dr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Aouta/main/Whisk_5d5c4056a088fc18e584d533a5adc2bedr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Aouta/main/Whisk_ab18b77e934e46e8ecb4168a6c7f00bedr.jpeg','https://raw.githubusercontent.com/alaamnst-collab/Aouta/main/Whisk_af18b18fd2c83af9b054085aca3763c4dr.jpeg'],videos:[]},
};

let lang=(()=>{const n=navigator.language?.slice(0,2);return['ar','fr','es'].includes(n)?n:'en'})();
let dark=localStorage.getItem('theme')==='dark';
let comments=[{id:1,name:'Ahmed',text:'عمل رائع ومحترف!',stars:5,date:'2026-03-10'},{id:2,name:'Sarah',text:'Excellent service, highly recommend!',stars:5,date:'2026-03-12'}];
let currentPage='home';
const servicesData=[{key:'videoAds',emoji:'🎬',page:'video'},{key:'webPages',emoji:'🌐',page:'pages'},{key:'stores',emoji:'🛒',page:'store'},{key:'apps',emoji:'📱',page:'app'},{key:'automation',emoji:'🤖',page:'automation'}];

function t(k){return T[k]?.[lang]||T[k]?.en||k}
function applyTheme(){document.documentElement.classList.toggle('dark',dark);document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';localStorage.setItem('theme',dark?'dark':'light')}
document.getElementById('themeBtn').onclick=()=>{dark=!dark;applyTheme()};
applyTheme();

function buildLangBar(){const bar=document.getElementById('langBar');bar.innerHTML='';['ar','en','fr','es'].forEach(c=>{const b=document.createElement('button');b.className='lang-btn'+(c===lang?' active':'');b.textContent=c.toUpperCase();b.onclick=()=>{lang=c;render()};bar.appendChild(b)})}

function render(){document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.documentElement.lang=lang;buildLangBar();renderHome();renderComments();Object.keys(pagesData).forEach(k=>renderServicePage(k));showPage(currentPage)}

function renderHome(){document.getElementById('heroSubtitle').textContent=t('heroSubtitle');document.getElementById('heroDesc').textContent=t('heroDesc');document.getElementById('heroContact').textContent=t('contactMe');document.getElementById('servicesTitle').textContent=t('services');const grid=document.getElementById('servicesGrid');grid.innerHTML='';servicesData.forEach((s,i)=>{const card=document.createElement('div');card.className='glass-card service-card anim-fade';card.style.animationDelay=`${i*.1}s`;card.innerHTML=`<span class="emoji">${s.emoji}</span><span class="label">${t(s.key)}</span>`;card.onclick=()=>{currentPage=s.page;showPage(s.page)};grid.appendChild(card)})}

function renderServicePage(key){
  const d=pagesData[key];
  const el=document.getElementById('page-'+key);
  const arrow=lang==='ar'?'→':'←';
  
  // زر واحد مباشر للإنستغرام يحمل السعر بدلاً من نافذة الدفع
  let btnsHTML=`<a href="https://www.instagram.com/mr.kessar?igsh=MTFybHViYm03cGx1MQ==" target="_blank" rel="noopener noreferrer" class="btn-primary">${t('orderNow')} — ${d.price}</a>`;
  
  let slidesHTML='';
  (d.images||[]).forEach(src=>{slidesHTML+=`<div class="swiper-slide"><img src="${src}" loading="lazy"></div>`});
  (d.videos||[]).forEach(src=>{slidesHTML+=`<div class="swiper-slide"><video controls><source src="${src}"></video></div>`});
  
  el.innerHTML=`<span class="back-link" onclick="currentPage='home';showPage('home')">${arrow} ${t('backHome')}</span><div class="anim-fade"><h1>${t(d.titleKey)}</h1><p class="page-desc">${t(d.descKey)}</p><div class="btns">${btnsHTML}</div></div><div class="gallery"><h2>${t('gallery')}</h2><div class="swiper swiper-${key}"><div class="swiper-wrapper">${slidesHTML}</div><div class="swiper-button-prev"></div><div class="swiper-button-next"></div><div class="swiper-pagination"></div></div></div>`;
}

function initSwiper(page){const sw=document.querySelector('.swiper-'+page);if(sw&&!sw.swiper)new Swiper(sw,{navigation:{nextEl:sw.querySelector('.swiper-button-next'),prevEl:sw.querySelector('.swiper-button-prev')},pagination:{el:sw.querySelector('.swiper-pagination'),clickable:true},spaceBetween:16,slidesPerView:1})}

function showPage(page){document.getElementById('home').style.display=page==='home'?'block':'none';Object.keys(pagesData).forEach(k=>{const el=document.getElementById('page-'+k);if(k===page){el.classList.add('active');el.style.display='block'}else{el.classList.remove('active');el.style.display='none'}});window.scrollTo(0,0);if(page!=='home')setTimeout(()=>initSwiper(page),100)}

function renderComments(){const sec=document.getElementById('commentsSection');let cHTML='';comments.forEach(c=>{let s='';for(let i=1;i<=5;i++)s+=`<span style="color:${i<=c.stars?'#facc15':'var(--muted-fg)'}">★</span>`;cHTML+=`<div class="glass-card comment-item"><div class="comment-header"><div class="comment-avatar">${c.name[0]}</div><span class="comment-name">${c.name}</span><span class="comment-date">${c.date}</span></div><div class="comment-stars">${s}</div><p class="comment-text">${c.text}</p></div>`});sec.innerHTML=`<h2>${t('comments')}</h2><div class="glass-card comment-form"><input id="commentName" placeholder="${t('name')}"><div class="stars-input" id="starsInput"></div><textarea id="commentText" rows="3" placeholder="${t('writeComment')}"></textarea><button class="btn-primary" onclick="addComment()">${t('submit')}</button></div><div id="commentsList">${cHTML}</div>`;const si=document.getElementById('starsInput');si.innerHTML='';for(let i=1;i<=5;i++)si.innerHTML+=`<button class="${i<=5?'active':''}" data-star="${i}" onclick="setCommentStars(${i})">★</button>`}

window.setCommentStars=n=>{document.querySelectorAll('#starsInput button').forEach(b=>b.className=parseInt(b.dataset.star)<=n?'active':'')};
window.addComment=()=>{const t=document.getElementById('commentText').value.trim();if(!t)return;const n=document.getElementById('commentName').value.trim()||'Guest';comments.unshift({id:Date.now(),name:n,text:t,stars:5,date:new Date().toISOString().slice(0,10)});renderComments()};

gsap.to('#heroLogo',{y:-15,duration:2,repeat:-1,yoyo:true,ease:'sine.inOut'});
render();
</script>
</body>
</html>
